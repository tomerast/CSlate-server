version: '3.9'

# Infrastructure only — API server and worker run locally (tsx watch) for hot-reload + debugging.
# See: scripts/dev.sh for the full startup sequence.
#
# Ports:
#   5432  — PostgreSQL (pgvector)
#   9000  — MinIO S3 API (R2 replacement)
#   9001  — MinIO web UI
#   8025  — MailHog web UI (view verification/recovery emails)
#   1025  — MailHog SMTP

services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cslate-postgres
    environment:
      POSTGRES_USER: cslate
      POSTGRES_PASSWORD: cslate
      POSTGRES_DB: cslate_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cslate -d cslate_dev']
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO — S3-compatible storage (local Cloudflare R2 replacement)
  minio:
    image: minio/minio:latest
    container_name: cslate-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web UI (http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO bucket initializer — creates 'cslate-dev' bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: cslate-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/cslate-dev &&
        mc anonymous set public local/cslate-dev &&
        echo 'MinIO bucket ready'
      "

  # MailHog — local SMTP server with web UI for email debugging
  # View emails at: http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: cslate-mailhog
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI

volumes:
  postgres_data:
  minio_data:
